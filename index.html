<!DOCTYPE html>
<html>
<head>
    <title>Loss Run Request Form</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: Arial; padding: 20px; }
        input, textarea { width: 100%; margin-bottom: 10px; padding: 8px; }
        .output { border: 1px solid #000; padding: 20px; margin-top: 20px; white-space: pre-line; }
        button { padding: 10px 20px; margin-right: 10px; }
        .download-btn { background-color: #28a745; color: white; border: none; cursor: pointer; }
        .download-btn:hover { background-color: #218838; }
        .hidden { display: none; }
    </style>
</head>
<body>

<h2>Loss Run Request Form</h2>

<label>Insured Name</label>
<input type="text" id="name">

<label>Address</label>
<textarea id="address"></textarea>

<label>Phone</label>
<input type="text" id="phone">

<label>Email</label>
<input type="text" id="email">

<label>Policy Number</label>
<input type="text" id="policy">

<label>Policy Period</label>
<input type="text" id="period">

<label>Insurance Company</label>
<input type="text" id="company">

<label>Owner Name</label>
<input type="text" id="owner">

<button onclick="generate()">Generate Letter</button>
<button id="downloadBtn" class="download-btn hidden" onclick="downloadPDF()">Download PDF</button>

<div class="output" id="output"></div>

<script>
function generate() {
    let name = document.getElementById("name").value;
    let address = document.getElementById("address").value;
    let phone = document.getElementById("phone").value;
    let email = document.getElementById("email").value;
    let policy = document.getElementById("policy").value;
    let period = document.getElementById("period").value;
    let company = document.getElementById("company").value;
    let owner = document.getElementById("owner").value;

    let letter = `
${name}
${address}
${phone}
${email}

To: ${company}

Attention: Loss Run Department
RE: Loss Run Request
Insured Name: ${name}
Policy Number(s): ${policy}
Policy Period(s): ${period}
Insurance Company: ${company}

To Whom It May Concern,

I, ${owner}, hereby request loss run statements for the above-referenced insurance policy(ies). Please provide up to 5 years of claims history (or complete history if less than 5 years), including the policy number, period of coverage, number of claims, paid losses, dates of each loss, and reserve amounts, as applicable.
Please send the loss run statements electronically to my authorized agent at:
Email: managertrucking1@gmail.com
Backup Fax: 305.556.5469
If a wet signature is required by your process, please notify us at the email address above. I appreciate your prompt assistance in providing this information within the 15-day timeframe required by law.

Sincerely,



${owner}
Owner
${email}
`;

    document.getElementById("output").innerText = letter;
    
    // Show download button
    document.getElementById("downloadBtn").classList.remove("hidden");
    
    // Store letter for PDF generation
    window.currentLetter = letter;
}

function downloadPDF() {
    if (!window.currentLetter) {
        alert("Please generate a letter first!");
        return;
    }
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Add custom font for better Unicode support
    doc.setFont("helvetica");
    doc.setFontSize(12);
    
    // Split letter into lines
    const lines = doc.splitTextToSize(window.currentLetter, 170);
    
    // Add text to PDF
    let y = 20;
    lines.forEach(line => {
        if (y > 270) {
            doc.addPage();
            y = 20;
        }
        doc.text(line, 20, y);
        y += 7;
    });
    
    // Create filename with company and policy period
    const name = document.getElementById("name").value || "LossRun";
    const company = document.getElementById("company").value || "Company";
    const period = document.getElementById("period").value || "Period";
    
    // Save PDF
    doc.save(`${name} - ${company} <> ${period}.pdf`);
}
</script>

</body>
</html>
