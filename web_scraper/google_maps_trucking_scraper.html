<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps USA Trucking Scraper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #map { height: 500px; border-radius: 12px; }
        .state-btn { transition: all 0.3s; }
        .state-btn:hover { transform: translateY(-2px); }
        .scraping { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
    </style>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto px-4 py-6 max-w-7xl">
        <header class="bg-white rounded-xl shadow-lg p-6 mb-6">
            <h1 class="text-3xl font-bold text-blue-600">🗺️ Google Maps USA Trucking Scraper</h1>
            <p class="text-gray-600">Extract trucking companies from all 50 US states via Google Maps</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-semibold mb-4">🗺️ USA Map</h2>
                    <div id="map"></div>
                    
                    <div class="mt-4 grid grid-cols-3 gap-3">
                        <button onclick="startAllStates()" class="bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600">
                            <i data-lucide="play" class="w-4 h-4 inline mr-2"></i>Start All States
                        </button>
                        <button onclick="stopScraping()" class="bg-red-500 text-white px-4 py-2 rounded-lg hover:bg-red-600">
                            <i data-lucide="square" class="w-4 h-4 inline mr-2"></i>Stop
                        </button>
                        <button onclick="downloadData()" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-600">
                            <i data-lucide="download" class="w-4 h-4 inline mr-2"></i>Download
                        </button>
                    </div>
                </div>
            </div>

            <div>
                <div class="bg-white rounded-xl shadow-lg p-6">
                    <h2 class="text-xl font-semibold mb-4">📊 Statistics</h2>
                    <div class="space-y-3">
                        <div class="bg-blue-50 p-3 rounded">
                            <div class="text-2xl font-bold text-blue-600" id="total-companies">0</div>
                            <div class="text-sm text-gray-600">Total Companies</div>
                        </div>
                        <div class="bg-green-50 p-3 rounded">
                            <div class="text-2xl font-bold text-green-600" id="states-completed">0</div>
                            <div class="text-sm text-gray-600">States Completed</div>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-lg p-6 mt-6">
                    <h2 class="text-xl font-semibold mb-4">📋 Status Log</h2>
                    <div id="status-log" class="space-y-2 max-h-64 overflow-y-auto text-sm">
                        <div class="p-2 bg-blue-50 rounded">🚀 Ready to start scraping...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-lg p-6 mt-6">
            <h2 class="text-xl font-semibold mb-4">🚛 Scraped Companies</h2>
            <div id="results" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-96 overflow-y-auto">
                <div class="col-span-full text-center text-gray-500 py-8">
                    <i data-lucide="inbox" class="w-12 h-12 mx-auto mb-2"></i>
                    <p>No companies scraped yet</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map;
        let scrapedData = [];
        let isScraping = false;

        const states = [
            {name: 'Alabama', code: 'AL', lat: 32.806671, lng: -86.791130},
            {name: 'Alaska', code: 'AK', lat: 61.370716, lng: -152.404419},
            {name: 'Arizona', code: 'AZ', lat: 33.729759, lng: -111.431221},
            {name: 'Arkansas', code: 'AR', lat: 34.969704, lng: -92.373123},
            {name: 'California', code: 'CA', lat: 36.116203, lng: -119.681564},
            {name: 'Colorado', code: 'CO', lat: 39.059811, lng: -105.311104},
            {name: 'Connecticut', code: 'CT', lat: 41.597782, lng: -72.755371},
            {name: 'Delaware', code: 'DE', lat: 39.318523, lng: -75.507141},
            {name: 'Florida', code: 'FL', lat: 27.766279, lng: -82.276826},
            {name: 'Georgia', code: 'GA', lat: 33.040619, lng: -83.643074},
            {name: 'Hawaii', code: 'HI', lat: 21.094318, lng: -157.498337},
            {name: 'Idaho', code: 'ID', lat: 44.240459, lng: -114.478828},
            {name: 'Illinois', code: 'IL', lat: 40.349457, lng: -88.494374},
            {name: 'Indiana', code: 'IN', lat: 39.849426, lng: -86.258278},
            {name: 'Iowa', code: 'IA', lat: 42.011539, lng: -93.210526},
            {name: 'Kansas', code: 'KS', lat: 39.011902, lng: -98.484246},
            {name: 'Kentucky', code: 'KY', lat: 37.839333, lng: -84.270018},
            {name: 'Louisiana', code: 'LA', lat: 31.169546, lng: -91.867805},
            {name: 'Maine', code: 'ME', lat: 44.693947, lng: -69.381927},
            {name: 'Maryland', code: 'MD', lat: 39.063946, lng: -76.802101},
            {name: 'Massachusetts', code: 'MA', lat: 42.230171, lng: -71.530106},
            {name: 'Michigan', code: 'MI', lat: 43.326618, lng: -84.536095},
            {name: 'Minnesota', code: 'MN', lat: 45.694454, lng: -93.192192},
            {name: 'Mississippi', code: 'MS', lat: 32.741646, lng: -89.678696},
            {name: 'Missouri', code: 'MO', lat: 38.456095, lng: -92.288368},
            {name: 'Montana', code: 'MT', lat: 46.921925, lng: -110.454353},
            {name: 'Nebraska', code: 'NE', lat: 41.125370, lng: -98.268082},
            {name: 'Nevada', code: 'NV', lat: 38.313515, lng: -117.055374},
            {name: 'New Hampshire', code: 'NH', lat: 43.452492, lng: -71.563896},
            {name: 'New Jersey', code: 'NJ', lat: 40.298939, lng: -74.521011},
            {name: 'New Mexico', code: 'NM', lat: 34.840515, lng: -106.248482},
            {name: 'New York', code: 'NY', lat: 42.165726, lng: -74.948051},
            {name: 'North Carolina', code: 'NC', lat: 35.630066, lng: -79.806419},
            {name: 'North Dakota', code: 'ND', lat: 47.551493, lng: -101.002012},
            {name: 'Ohio', code: 'OH', lat: 40.388783, lng: -82.764915},
            {name: 'Oklahoma', code: 'OK', lat: 35.565342, lng: -96.928917},
            {name: 'Oregon', code: 'OR', lat: 44.000000, lng: -120.500000},
            {name: 'Pennsylvania', code: 'PA', lat: 40.590752, lng: -77.209755},
            {name: 'Rhode Island', code: 'RI', lat: 41.680893, lng: -71.511780},
            {name: 'South Carolina', code: 'SC', lat: 33.856892, lng: -80.945007},
            {name: 'South Dakota', code: 'SD', lat: 44.299782, lng: -99.438828},
            {name: 'Tennessee', code: 'TN', lat: 35.747845, lng: -86.692345},
            {name: 'Texas', code: 'TX', lat: 31.054487, lng: -97.563461},
            {name: 'Utah', code: 'UT', lat: 40.150032, lng: -111.862434},
            {name: 'Vermont', code: 'VT', lat: 44.045876, lng: -72.710686},
            {name: 'Virginia', code: 'VA', lat: 37.769337, lng: -78.169968},
            {name: 'Washington', code: 'WA', lat: 47.391742, lng: -121.570826},
            {name: 'West Virginia', code: 'WV', lat: 38.491226, lng: -80.954570},
            {name: 'Wisconsin', code: 'WI', lat: 44.268543, lng: -89.616508},
            {name: 'Wyoming', code: 'WY', lat: 42.755966, lng: -107.302490}
        ];

        function initMap() {
            map = new google.maps.Map(document.getElementById('map'), {
                center: {lat: 39.8283, lng: -98.5795},
                zoom: 4,
                styles: [{
                    featureType: "administrative",
                    elementType: "geometry",
                    stylers: [{visibility: "on"}]
                }]
            });

            states.forEach(state => {
                new google.maps.Marker({
                    position: {lat: state.lat, lng: state.lng},
                    map: map,
                    title: state.name
                });
            });
        }

        async function scrapeState(state) {
            addStatusLog(`🔍 Scraping ${state.name}...`);
            
            // Simulate Google Maps search for trucking companies
            const companies = await searchGoogleMaps(`${state.name} trucking companies`);
            
            companies.forEach(company => {
                scrapedData.push({
                    ...company,
                    state: state.code,
                    stateName: state.name
                });
            });
            
            updateStats();
            displayResults();
            addStatusLog(`✅ Found ${companies.length} companies in ${state.name}`);
        }

        async function searchGoogleMaps(query) {
            // Simulated Google Maps API response
            const companies = [];
            const count = Math.floor(Math.random() * 10) + 5;
            
            for (let i = 0; i < count; i++) {
                companies.push({
                    companyName: `${query} Company ${i + 1}`,
                    phone: `(${Math.floor(Math.random() * 900) + 100}) ${Math.floor(Math.random() * 900) + 100}-${Math.floor(Math.random() * 9000) + 1000}`,
                    address: `${Math.floor(Math.random() * 9999) + 1} Main St`,
                    rating: (Math.random() * 2 + 3).toFixed(1),
                    website: `https://example${i}.com`,
                    scrapedAt: new Date().toISOString()
                });
            }
            
            return companies;
        }

        async function startAllStates() {
            if (isScraping) return;
            isScraping = true;
            
            for (const state of states) {
                if (!isScraping) break;
                await scrapeState(state);
                await new Promise(resolve => setTimeout(resolve, 1000));
            }
            
            isScraping = false;
            addStatusLog('🎉 All states completed!');
        }

        function stopScraping() {
            isScraping = false;
            addStatusLog('⏹️ Stopped by user');
        }

        function updateStats() {
            document.getElementById('total-companies').textContent = scrapedData.length;
            document.getElementById('states-completed').textContent = states.filter(s => 
                scrapedData.some(c => c.state === s.code)).length;
        }

        function displayResults() {
            const container = document.getElementById('results');
            if (scrapedData.length === 0) return;
            
            container.innerHTML = scrapedData.slice(-12).map(company => `
                <div class="bg-white border rounded-lg p-4 hover:shadow-lg transition-all">
                    <h3 class="font-semibold">${company.companyName}</h3>
                    <div class="text-sm text-gray-600 space-y-1">
                        <div>📞 ${company.phone}</div>
                        <div>📍 ${company.address}</div>
                        <div>⭐ ${company.rating}</div>
                        <div>🌐 ${company.website}</div>
                        <div>🏢 ${company.stateName}</div>
                    </div>
                </div>
            `).join('');
        }

        function addStatusLog(message) {
            const log = document.getElementById('status-log');
            const div = document.createElement('div');
            div.className = 'p-2 bg-blue-50 rounded text-sm';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function downloadData() {
            if (scrapedData.length === 0) return;
            
            const csv = 'Company Name,Phone,Address,Rating,Website,State,Scraped At\n' + 
                scrapedData.map(c => `"${c.companyName}","${c.phone}","${c.address}","${c.rating}","${c.website}","${c.stateName}","${c.scrapedAt}"`).join('\n');
            
            const blob = new Blob([csv], {type: 'text/csv'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'usa_trucking_companies.csv';
            a.click();
            
            addStatusLog('✅ Data downloaded!');
        }

        // Load Google Maps API
        function loadGoogleMaps() {
            const script = document.createElement('script');
            script.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyB41DRUbKWJHPxaFjMAwdrzWzbVKartNGg&callback=initMap';
            document.body.appendChild(script);
        }

        window.onload = loadGoogleMaps;
    </script>
</body>
</html>
